---
- name: Base Configuration - IP and Hostnames
  hosts: all
  gather_facts: yes
  tasks:
    - name: Set Hostname (Docker Workaround)
      shell: echo "{{ inventory_hostname }}" > /etc/hostname && hostname "{{ inventory_hostname }}" || true

    - name: Configure IP on eth0
      shell: ip addr add {{ ansible_host }}/24 dev eth0 || true
      when: inventory_hostname != 'router1'

    - name: Configure Router interfaces
      shell: |
        ip addr add 192.168.10.1/27 dev eth0 || true
        ip addr add 192.168.10.33/27 dev eth1 || true
      when: inventory_hostname == 'router1'

    - name: Configure Production IPs on Hosts
      shell: "ip addr add {{ item.ip }}/27 dev eth0 || true"
      loop:
        - { host: 'host1', ip: '192.168.10.2' }
        - { host: 'host2', ip: '192.168.10.3' }
        - { host: 'host3', ip: '192.168.10.34' }
        - { host: 'host4', ip: '192.168.10.35' }
      when: inventory_hostname == item.host
